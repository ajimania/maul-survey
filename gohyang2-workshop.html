<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 고향 자랑 | 워크숍</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #1c1410; --surface: #2b1f18; --surface2: #3a2a20;
      --orange: #d4622a; --tan: #c9a97a;
      --text: #f0e4d4; --muted: rgba(240,228,212,.5);
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100dvh; overflow: hidden; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ── 탭 바 ── */
    .nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; flex-shrink: 0;
    }
    .nav-tab {
      flex: 1; padding: 14px 8px; border: none;
      background: none; color: var(--muted);
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .nav-tab.on { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── 패널 ── */
    .panel { display: none; flex: 1; min-height: 0; position: relative; }
    .panel.on { display: flex; flex-direction: column; }

    /* ── 지도 ── */
    #main-map { flex: 1; min-height: 0; }

    /* 필터 바 */
    .p-filter-bar {
      position: absolute; left: 10px; top: 10px; z-index: 900;
      display: flex; flex-direction: column; gap: 6px;
      max-height: calc(100% - 40px); overflow-y: auto;
      pointer-events: auto;
    }
    .p-filter-btn {
      background: rgba(28,20,16,.88); border: 1px solid var(--border);
      color: var(--text); border-radius: 20px;
      padding: 7px 16px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      backdrop-filter: blur(10px); transition: all .15s;
    }
    .p-filter-btn.on { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* 지도 위 이유 박스 */
    .map-reason {
      position: absolute; top: 12px; right: 12px; z-index: 800;
      background: rgba(28,20,16,.88); backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,122,.25); border-radius: 14px;
      padding: 14px 18px; max-width: 280px; display: none;
    }
    .map-reason.show { display: block; }
    .map-reason-name {
      font-size: 13px; font-weight: 900; color: var(--tan); margin-bottom: 6px;
    }
    .map-reason-text {
      font-size: 13px; color: var(--text); line-height: 1.75;
      max-height: 200px; overflow-y: auto;
    }

    /* 핀 */
    .map-pin {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
      cursor: pointer;
    }

    /* ── 사진 갤러리 ── */
    #p-photos { overflow-y: auto; }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .photo-item {
      position: relative; aspect-ratio: 1;
      overflow: hidden; cursor: pointer;
    }
    .photo-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .25s;
    }
    .photo-item:hover img { transform: scale(1.06); }
    .photo-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 10px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.75));
      color: #fff; font-size: 13px; font-weight: 800;
    }
    .photo-sub { font-size: 11px; font-weight: 500; opacity: .8; margin-top: 2px; }
    .no-photo {
      text-align: center; padding: 80px 20px;
      color: var(--muted); font-size: 14px;
      grid-column: 1 / -1;
    }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    #lightbox.show { display: flex; }
    #lb-img {
      max-width: 88vw; max-height: 60vh;
      border-radius: 12px; object-fit: contain;
    }
    #lb-info {
      margin-top: 18px; text-align: center; max-width: 440px;
    }
    #lb-name     { color: var(--tan); font-size: 17px; font-weight: 900; }
    #lb-hometown { color: var(--muted); font-size: 13px; margin-top: 4px; }
    #lb-reason   { color: var(--text); font-size: 14px; margin-top: 10px; line-height: 1.75; }
    #lb-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 30px; color: #fff; cursor: pointer; line-height: 1;
    }

    .leaflet-control-zoom { margin-right: 10px !important; margin-bottom: 10px !important; }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-tab on" onclick="switchTab('map',    this)">🗺 지도</button>
  <button class="nav-tab"    onclick="switchTab('photos', this)">📸 사진</button>
</nav>

<!-- 지도 -->
<div class="panel on" id="p-map">
  <div id="main-map"></div>
  <div class="p-filter-bar" id="p-filter-bar">
    <button class="p-filter-btn on" id="pf-all" onclick="filterMap(null)">🗺 전체</button>
  </div>
  <div class="map-reason" id="map-reason">
    <div class="map-reason-name" id="map-reason-name"></div>
    <div class="map-reason-text" id="map-reason-text"></div>
  </div>
</div>

<!-- 사진 -->
<div class="panel" id="p-photos">
  <div class="photo-grid" id="photo-grid">
    <div class="no-photo">불러오는 중…</div>
  </div>
</div>

<!-- 라이트박스 -->
<div id="lightbox" onclick="closeLb()">
  <span id="lb-close" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-info">
    <div id="lb-name"></div>
    <div id="lb-hometown"></div>
    <div id="lb-reason"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://hncuvjrghniwihhfpata.supabase.co',
  'sb_publishable_JcCV2PIrJV59VK9ihPCmXg_J0RmJ9AB'
);

const COLORS = ['#d4622a','#4a90d9','#5d9e56','#9b59b6','#e67e22','#1abc9c','#c0392b','#2980b9','#8e44ad','#27ae60','#e74c3c','#16a085'];

let participants = [];
let activeFilter = null;
const pMarkers = {};

// ── 탭 전환 ──────────────────────────────────
window.switchTab = function(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('on'));
  document.getElementById('p-' + id).classList.add('on');
  btn.classList.add('on');
  if (id === 'map') setTimeout(() => map.invalidateSize(), 50);
};

// ── 지도 ─────────────────────────────────────
const map = L.map('main-map', { zoomControl: false }).setView([36.5, 127.5], 7);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

function addMarker(p) {
  if (!p.lat || !p.lng) return;
  const div = document.createElement('div');
  div.className = 'map-pin';
  div.style.background = p._color;
  div.textContent = p.name.slice(0, 1);

  const icon = L.divIcon({ html: div.outerHTML, iconSize: [36, 36], iconAnchor: [18, 18], className: '' });
  const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
  marker.bindTooltip(p.name, { permanent: false, direction: 'top', offset: [0, -20] });
  marker.on('click', () => filterMap(p.id));
  pMarkers[p.id] = marker;
}

function fitAll() {
  const pts = participants.filter(p => p.lat && p.lng).map(p => [p.lat, p.lng]);
  if (pts.length > 1) map.fitBounds(pts, { padding: [50, 50] });
  else if (pts.length === 1) map.setView(pts[0], 9);
}

window.filterMap = function(pid) {
  activeFilter = pid;
  document.querySelectorAll('.p-filter-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(pid ? 'pf-' + pid : 'pf-all')?.classList.add('on');

  participants.forEach(p => {
    const vis = !pid || pid === p.id;
    if (pMarkers[p.id]) { pMarkers[p.id].remove(); if (vis) pMarkers[p.id].addTo(map); }
  });

  const reasonEl = document.getElementById('map-reason');
  if (pid) {
    const p = participants.find(x => x.id === pid);
    if (p?.lat) map.setView([p.lat, p.lng], 10);
    if (p?.reason) {
      document.getElementById('map-reason-name').textContent = p.name + ' · ' + (p.hometown || '');
      document.getElementById('map-reason-text').textContent = p.reason;
      reasonEl.classList.add('show');
    } else { reasonEl.classList.remove('show'); }
  } else {
    fitAll();
    reasonEl.classList.remove('show');
  }
};

function renderFilterBar() {
  const bar = document.getElementById('p-filter-bar');
  bar.innerHTML = `<button class="p-filter-btn on" id="pf-all" onclick="filterMap(null)">🗺 전체</button>`;
  participants.forEach(p => {
    bar.innerHTML += `<button class="p-filter-btn" id="pf-${p.id}"
      style="border-left:3px solid ${p._color}"
      onclick="filterMap('${p.id}')">${p.name}</button>`;
  });
}

// ── 사진 ─────────────────────────────────────
// 라이트박스용 전역 배열
let lbItems = [];

function renderPhotos() {
  lbItems = [];
  participants.forEach(p => {
    [p.photo_data, p.photo2_data, p.photo3_data].forEach(src => {
      if (src) lbItems.push({ src, p });
    });
  });

  const grid = document.getElementById('photo-grid');
  if (!lbItems.length) {
    grid.innerHTML = '<div class="no-photo">아직 사진이 없어요.</div>';
    return;
  }
  grid.innerHTML = lbItems.map((item, i) => `
    <div class="photo-item" onclick="openLb(${i})">
      <img src="${item.src}" loading="lazy" alt="${item.p.name}"/>
      <div class="photo-label">
        <div>${item.p.name}</div>
        <div class="photo-sub">📍 ${item.p.hometown || ''}</div>
      </div>
    </div>
  `).join('');
}

window.openLb = function(i) {
  const { src, p } = lbItems[i];
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-name').textContent = p.name;
  document.getElementById('lb-hometown').textContent = '📍 ' + (p.hometown || '');
  document.getElementById('lb-reason').textContent = p.reason || '';
  document.getElementById('lightbox').classList.add('show');
};
window.closeLb = function() {
  document.getElementById('lightbox').classList.remove('show');
};

// ── 데이터 로드 ───────────────────────────────
async function load() {
  const { data, error } = await sb
    .from('gohyang2_participants').select('*').order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  participants = (data || []).map((p, i) => ({ ...p, _color: COLORS[i % COLORS.length] }));
  participants.forEach(addMarker);
  fitAll();
  renderPhotos();
  renderFilterBar();
}

// ── 실시간 ───────────────────────────────────
sb.channel('gohyang2-live')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gohyang2_participants' }, payload => {
    const p = { ...payload.new, _color: COLORS[participants.length % COLORS.length] };
    participants.push(p);
    addMarker(p);
    renderPhotos();
    renderFilterBar();
  })
  .subscribe();

load();
</script>
</body>
</html>

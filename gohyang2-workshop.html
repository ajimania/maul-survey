<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 고향 자랑 | 워크숍</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #1c1410; --surface: #2b1f18; --surface2: #3a2a20;
      --orange: #d4622a; --tan: #c9a97a;
      --text: #f0e4d4; --muted: rgba(240,228,212,.5);
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100dvh; overflow: hidden; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ── 탭 바 ── */
    .nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; flex-shrink: 0;
    }
    .nav-tab {
      flex: 1; padding: 14px 8px; border: none;
      background: none; color: var(--muted);
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .nav-tab.on { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── 패널 ── */
    .panel { display: none; flex: 1; min-height: 0; position: relative; }
    .panel.on { display: flex; flex-direction: column; }

    /* ── 지도 ── */
    #main-map { flex: 1; min-height: 0; }

    /* 필터 바 */
    .p-filter-bar {
      position: absolute; left: 10px; top: 10px; z-index: 900;
      display: flex; flex-direction: column; gap: 6px;
      max-height: calc(100% - 40px); overflow-y: auto;
      pointer-events: auto;
    }
    .p-filter-btn {
      background: rgba(28,20,16,.88); border: 1px solid var(--border);
      color: var(--text); border-radius: 20px;
      padding: 7px 16px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      backdrop-filter: blur(10px); transition: all .15s;
    }
    .p-filter-btn.on { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* 지도 위 이유 박스 */
    .map-reason {
      position: absolute; top: 12px; right: 12px; z-index: 800;
      background: rgba(28,20,16,.88); backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,122,.25); border-radius: 14px;
      padding: 14px 18px; max-width: 280px; display: none;
    }
    .map-reason.show { display: block; }
    .map-reason-name {
      font-size: 13px; font-weight: 900; color: var(--tan); margin-bottom: 10px;
    }
    .map-reason-section { margin-bottom: 10px; }
    .map-reason-section:last-child { margin-bottom: 0; }
    .map-reason-label {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;
    }
    .map-reason-text {
      font-size: 13px; color: var(--text); line-height: 1.75;
      max-height: 120px; overflow-y: auto;
    }
    .map-reason-divider {
      border: none; border-top: 1px solid rgba(255,255,255,.08);
      margin: 10px 0;
    }

    /* ── 사진 갤러리 ── */
    #p-photos { overflow-y: hidden; }

    .gallery-selector {
      display: flex; gap: 7px; flex-wrap: wrap; flex-shrink: 0;
      padding: 14px 16px 10px; overflow-x: auto;
    }
    .sel-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: none; color: var(--muted);
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all .15s;
    }
    .sel-btn.on { background: var(--orange); border-color: var(--orange); color: #fff; }

    .gallery-stage {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      padding: 0 16px 16px;
    }
    .g-photo-frame {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
    }
    .g-img-wrap {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .g-img-wrap img {
      max-width: 100%; max-height: 100%;
      display: block; object-fit: contain;
      border-radius: 8px;
    }
    .g-caption {
      padding: 10px 16px; font-size: 13px;
      color: var(--muted); text-align: center;
    }
    .g-nav {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      padding: 10px 0 4px; flex-shrink: 0;
    }
    .g-arrow {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: none;
      color: var(--text); font-size: 22px; cursor: pointer;
      transition: background .15s; display: flex;
      align-items: center; justify-content: center;
    }
    .g-arrow:hover { background: var(--orange); }
    .g-arrow:disabled { opacity: .2; cursor: default; }
    .g-counter {
      font-size: 14px; color: var(--muted); min-width: 50px; text-align: center;
    }
    .no-select {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px;
    }

    .leaflet-control-zoom { margin-right: 10px !important; margin-bottom: 10px !important; }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-tab on" onclick="switchTab('map',    this)">🗺 지도</button>
  <button class="nav-tab"    onclick="switchTab('photos', this)">📸 사진</button>
</nav>

<!-- 지도 -->
<div class="panel on" id="p-map">
  <div id="main-map"></div>
  <div class="p-filter-bar" id="p-filter-bar">
    <button class="p-filter-btn on" id="pf-all" onclick="filterMap(null)">🗺 전체</button>
  </div>
  <div class="map-reason" id="map-reason">
    <div class="map-reason-name" id="map-reason-name"></div>
    <div class="map-reason-section" id="map-reason-section1" style="display:none">
      <div class="map-reason-label">좋아하는 이유</div>
      <div class="map-reason-text" id="map-reason-text"></div>
    </div>
    <hr class="map-reason-divider" id="map-reason-divider" style="display:none"/>
    <div class="map-reason-section" id="map-reason-section2" style="display:none">
      <div class="map-reason-label">요즘 나의 고민</div>
      <div class="map-reason-text" id="map-concern-text"></div>
    </div>
  </div>
</div>

<!-- 사진 -->
<div class="panel" id="p-photos">
  <div class="gallery-selector" id="gallery-selector">
    <div style="color:var(--muted);font-size:14px;padding:6px 0;">불러오는 중…</div>
  </div>
  <div class="gallery-stage" id="gallery-stage">
    <div class="no-select">참가자를 선택하면 사진이 표시돼요</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://hncuvjrghniwihhfpata.supabase.co',
  'sb_publishable_JcCV2PIrJV59VK9ihPCmXg_J0RmJ9AB'
);

const COLORS = ['#d4622a','#4a90d9','#5d9e56','#9b59b6','#e67e22','#1abc9c','#c0392b','#2980b9','#8e44ad','#27ae60','#e74c3c','#16a085'];

let participants = [];
let activeFilter = null;
const pMarkers = {}; // pid → [marker, ...]
const pLines   = {}; // pid → L.polyline

// 갤러리 상태
let curParticipant = null;
let curPhotoIdx = 0;

// ── 위치 파싱 ─────────────────────────────────
// locations 필드: "도시명|lat|lng,도시명|lat|lng"
// 없으면 lat/lng 단일값으로 폴백
function getLocations(p) {
  if (p.locations) {
    return p.locations.split(',').map(s => {
      const parts = s.split('|');
      return { name: parts[0], lat: parseFloat(parts[1]), lng: parseFloat(parts[2]) };
    }).filter(l => !isNaN(l.lat) && !isNaN(l.lng));
  }
  if (p.lat && p.lng) return [{ name: p.hometown || '', lat: p.lat, lng: p.lng }];
  return [];
}

// ── 탭 전환 ──────────────────────────────────
window.switchTab = function(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('on'));
  document.getElementById('p-' + id).classList.add('on');
  btn.classList.add('on');
  if (id === 'map') setTimeout(() => map.invalidateSize(), 50);
};

// ── 지도 ─────────────────────────────────────
const map = L.map('main-map', { zoomControl: false }).setView([36.5, 127.5], 7);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

function addMarker(p) {
  const locs = getLocations(p);
  if (!locs.length) return;
  pMarkers[p.id] = [];
  // 여러 위치면 점선으로 연결
  if (locs.length >= 2) {
    pLines[p.id] = L.polyline(locs.map(l => [l.lat, l.lng]), {
      color: p._color, weight: 2, dashArray: '8, 10', opacity: 0.75
    }).addTo(map);
  }
  locs.forEach(loc => {
    const icon = L.divIcon({
      html: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="12" fill="${p._color}" stroke="white" stroke-width="2"/>
        <text x="14" y="19" text-anchor="middle" font-size="12" font-weight="900" fill="white" font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif">${p.name.slice(0,1)}</text>
      </svg>`,
      iconSize: [28, 28], iconAnchor: [14, 14], className: ''
    });
    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
    marker.bindTooltip(`${p.name} · ${loc.name}`, { permanent: false, direction: 'top', offset: [0, -16] });
    marker.on('click', () => filterMap(p.id));
    pMarkers[p.id].push(marker);
  });
}

function fitAll() {
  const pts = [];
  participants.forEach(p => getLocations(p).forEach(l => pts.push([l.lat, l.lng])));
  if (pts.length > 1) map.fitBounds(pts, { padding: [50, 50] });
  else if (pts.length === 1) map.setView(pts[0], 9);
}

window.filterMap = function(pid) {
  activeFilter = pid;
  document.querySelectorAll('.p-filter-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(pid ? 'pf-' + pid : 'pf-all')?.classList.add('on');

  participants.forEach(p => {
    const vis = !pid || pid === p.id;
    if (pMarkers[p.id]) {
      pMarkers[p.id].forEach(m => { m.remove(); if (vis) m.addTo(map); });
    }
  });

  participants.forEach(p => {
    const vis = !pid || pid === p.id;
    if (pLines[p.id]) { pLines[p.id].remove(); if (vis) pLines[p.id].addTo(map); }
  });

  const reasonEl = document.getElementById('map-reason');
  if (pid) {
    const p = participants.find(x => x.id === pid);
    const locs = getLocations(p);
    if (locs.length === 1) {
      map.setView([locs[0].lat, locs[0].lng], 10);
    } else if (locs.length > 1) {
      map.fitBounds(locs.map(l => [l.lat, l.lng]), { padding: [60, 60] });
    }
    if (p?.reason || p?.concern) {
      document.getElementById('map-reason-name').textContent = p.name + ' · ' + (p.hometown || '');
      const sec1 = document.getElementById('map-reason-section1');
      const sec2 = document.getElementById('map-reason-section2');
      const div  = document.getElementById('map-reason-divider');
      if (p.reason) {
        document.getElementById('map-reason-text').textContent = p.reason;
        sec1.style.display = '';
      } else { sec1.style.display = 'none'; }
      if (p.concern) {
        document.getElementById('map-concern-text').textContent = p.concern;
        sec2.style.display = '';
      } else { sec2.style.display = 'none'; }
      div.style.display = (p.reason && p.concern) ? '' : 'none';
      reasonEl.classList.add('show');
    } else { reasonEl.classList.remove('show'); }
  } else {
    fitAll();
    reasonEl.classList.remove('show');
  }
};

function renderFilterBar() {
  const bar = document.getElementById('p-filter-bar');
  bar.innerHTML = `<button class="p-filter-btn on" id="pf-all" onclick="filterMap(null)">🗺 전체</button>`;
  participants.forEach(p => {
    bar.innerHTML += `<button class="p-filter-btn" id="pf-${p.id}"
      style="border-left:3px solid ${p._color}"
      onclick="filterMap('${p.id}')">${p.name}</button>`;
  });
}

// ── 사진 갤러리 ──────────────────────────────
function photosOf(p) {
  return [p.photo_data, p.photo2_data, p.photo3_data].filter(Boolean);
}

function renderGallerySelector() {
  const sel = document.getElementById('gallery-selector');
  const withPhotos = participants.filter(p => photosOf(p).length > 0);
  if (!withPhotos.length) {
    sel.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:6px 0;">아직 사진이 없어요.</div>';
    return;
  }
  sel.innerHTML = withPhotos.map(p =>
    `<button class="sel-btn${curParticipant?.id === p.id ? ' on' : ''}"
      onclick="selectParticipant('${p.id}')">${p.name}</button>`
  ).join('');
}

window.selectParticipant = function(pid) {
  curParticipant = participants.find(p => p.id === pid) || null;
  curPhotoIdx = 0;
  renderGallerySelector();
  renderGalleryStage();
};

function renderGalleryStage() {
  const stage = document.getElementById('gallery-stage');
  if (!curParticipant) {
    stage.innerHTML = '<div class="no-select">참가자를 선택하면 사진이 표시돼요</div>';
    return;
  }
  const photos = photosOf(curParticipant);
  if (!photos.length) {
    stage.innerHTML = '<div class="no-select">사진이 없어요.</div>';
    return;
  }
  const src = photos[curPhotoIdx];
  stage.innerHTML = `
    <div class="g-photo-frame">
      <div class="g-img-wrap">
        <img src="${src}" alt="${curParticipant.name}"/>
      </div>
      <div class="g-caption">${curParticipant.name} · 📍${curParticipant.hometown || ''}</div>
    </div>
    <div class="g-nav">
      <button class="g-arrow" onclick="galleryPrev()" ${curPhotoIdx === 0 ? 'disabled' : ''}>‹</button>
      <span class="g-counter">${curPhotoIdx + 1} / ${photos.length}</span>
      <button class="g-arrow" onclick="galleryNext()" ${curPhotoIdx === photos.length - 1 ? 'disabled' : ''}>›</button>
    </div>
  `;
}

window.galleryPrev = function() {
  if (!curParticipant || curPhotoIdx <= 0) return;
  curPhotoIdx--;
  renderGalleryStage();
};

window.galleryNext = function() {
  if (!curParticipant) return;
  if (curPhotoIdx < photosOf(curParticipant).length - 1) { curPhotoIdx++; renderGalleryStage(); }
};

// ── 데이터 로드 ───────────────────────────────
async function load() {
  const { data, error } = await sb
    .from('gohyang2_participants').select('*').order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  participants = (data || []).map((p, i) => ({ ...p, _color: COLORS[i % COLORS.length] }));
  participants.forEach(addMarker);
  fitAll();
  renderFilterBar();
  renderGallerySelector();
}

// ── 실시간 ───────────────────────────────────
sb.channel('gohyang2-live')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gohyang2_participants' }, payload => {
    const p = { ...payload.new, _color: COLORS[participants.length % COLORS.length] };
    participants.push(p);
    addMarker(p);
    renderFilterBar();
    renderGallerySelector();
  })
  .subscribe();

load();
</script>
</body>
</html>

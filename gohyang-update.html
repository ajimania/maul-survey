<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 고향 자랑대회 | 정보 수정</title>
  <style>
    :root {
      --cream: #faf6ef;
      --brown: #3d2b1f;
      --orange: #d4622a;
      --tan: #c9a97a;
      --tan-light: #e8d5b7;
      --text: #2c1f14;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--cream); color: var(--text); min-height: 100dvh;
    }
    .app-header {
      background: var(--brown); color: #fff;
      padding: 16px 20px 14px; text-align: center;
    }
    .app-header h1 { font-size: 17px; font-weight: 900; }
    .app-header p  { font-size: 11px; opacity: .6; margin-top: 3px; }

    .wrap { max-width: 540px; margin: 0 auto; padding: 32px 20px 120px; }

    /* ── 본인 확인 ── */
    #verify-section { }
    .verify-title { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
    .verify-desc  { font-size: 14px; color: #7a5840; line-height: 1.75; margin-bottom: 24px; }

    /* ── 필드 ── */
    .field { margin-bottom: 20px; }
    .field > label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--brown); margin-bottom: 7px;
    }
    .field .hint { font-size: 12px; color: #aaa; margin-top: 5px; }
    .field input[type=text],
    .field input[type=tel],
    .field textarea {
      width: 100%; padding: 13px 15px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 16px; font-family: inherit;
      background: #fff; transition: border-color .2s;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(212,98,42,.1);
    }
    .field textarea { min-height: 120px; resize: vertical; }

    /* ── 버튼 ── */
    .btn-row {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #eee;
      padding: 10px 16px 14px; display: flex; gap: 10px;
      box-shadow: 0 -4px 16px rgba(0,0,0,.07); z-index: 300;
    }
    .btn {
      padding: 14px 0; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: transform .1s, opacity .15s; flex: 1;
    }
    .btn:active { transform: scale(.97); }
    .btn-main   { background: var(--orange); color: #fff; }
    .btn-main:disabled { opacity: .45; cursor: default; }
    .btn-ghost  { background: #f0f0f0; color: #666; flex: 0 0 76px; }

    /* ── 사진 슬롯 ── */
    .photo-slots { display: flex; flex-direction: column; gap: 14px; }
    .pslot {
      background: #fff; border: 1.5px dashed #ccc;
      border-radius: 12px; overflow: hidden; transition: border-color .2s;
    }
    .pslot.filled { border: 1.5px solid var(--orange); }
    .pslot-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .pslot-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--orange); color: #fff;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pslot-title { font-size: 13px; font-weight: 700; flex: 1; }
    .pslot-upload {
      background: var(--cream); border: 1px solid #ddd; border-radius: 6px;
      padding: 5px 11px; font-size: 12px; cursor: pointer;
      color: var(--brown); flex-shrink: 0;
    }
    .pslot-del {
      background: none; border: 1px solid #fcc; border-radius: 6px;
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      color: #c55; flex-shrink: 0; display: none;
    }
    .pslot.filled .pslot-del { display: block; }
    .pslot-img { width: 100%; max-height: 180px; object-fit: cover; display: none; }
    .pslot-cap { padding: 0 14px 12px; }
    .pslot-cap input {
      width: 100%; padding: 8px 11px;
      border: 1px solid #eee; border-radius: 6px;
      font-size: 13px; font-family: inherit; background: #fafafa;
    }
    .pslot-cap input:focus { outline: none; border-color: var(--orange); }

    /* ── 구분선 ── */
    .section-title {
      font-size: 15px; font-weight: 900; color: var(--brown);
      margin: 28px 0 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--tan-light);
    }

    /* ── 상태 메시지 ── */
    .status-box {
      padding: 14px 18px; border-radius: 10px; font-size: 14px;
      margin-bottom: 20px; line-height: 1.6;
    }
    .status-box.err  { background: #fff0f0; border: 1px solid #fcc; color: #c00; }
    .status-box.info { background: #fff8f0; border: 1px solid var(--tan-light); color: var(--brown); }
    .status-box.ok   { background: #f0fff4; border: 1px solid #b2dfdb; color: #1b6b47; }

    /* ── 참가자 이름 배지 ── */
    .user-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--brown); color: #fff;
      padding: 8px 16px; border-radius: 20px;
      font-size: 14px; font-weight: 700; margin-bottom: 24px;
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>🏡 내 고향 자랑대회</h1>
  <p>참가자 정보 수정</p>
</div>

<div class="wrap">

  <!-- ── 본인 확인 ── -->
  <div id="verify-section">
    <div class="verify-title">본인 확인 📱</div>
    <div class="verify-desc">
      신청 시 입력한 전화번호로 본인을 확인해요.<br>
      확인 후 정보를 수정할 수 있어요.
    </div>
    <div id="verify-msg"></div>
    <div class="field">
      <label>전화번호</label>
      <input type="tel" id="v-phone" placeholder="010-0000-0000" maxlength="20" autocomplete="tel"/>
    </div>
  </div>

  <!-- ── 수정 폼 (확인 후 표시) ── -->
  <div id="edit-section" style="display:none">
    <div class="user-badge">
      <span>👤</span><span id="u-name"></span>
    </div>

    <div class="section-title">📍 지역 여정</div>
    <div class="field">
      <label>고향, 거쳐온 지역</label>
      <input type="text" id="e-hometown" placeholder="예: 목포시, 서울 성북구, 도쿄" maxlength="200"/>
      <div class="hint">콤마(,)로 구분해 여러 지역을 적어주세요.</div>
    </div>
    <div class="field">
      <label>각 지역의 기억</label>
      <textarea id="e-story" placeholder="그 지역을 떠올리면 생각나는 이야기…"></textarea>
    </div>

    <div class="section-title">📸 고향 자랑 사진</div>
    <div class="photo-slots">
      <div class="pslot" id="slot1">
        <div class="pslot-head">
          <div class="pslot-num">1</div>
          <div class="pslot-title">첫 번째 사진</div>
          <label class="pslot-upload" for="file1">📷 선택</label>
          <input type="file" id="file1" accept="image/*" style="display:none" onchange="onPhoto(1,this)"/>
          <button class="pslot-del" onclick="delPhoto(1)">삭제</button>
        </div>
        <img id="img1" class="pslot-img"/>
        <div class="pslot-cap"><input type="text" id="cap1" placeholder="한 줄 설명 (선택)"/></div>
      </div>
      <div class="pslot" id="slot2">
        <div class="pslot-head">
          <div class="pslot-num">2</div>
          <div class="pslot-title">두 번째 사진</div>
          <label class="pslot-upload" for="file2">📷 선택</label>
          <input type="file" id="file2" accept="image/*" style="display:none" onchange="onPhoto(2,this)"/>
          <button class="pslot-del" onclick="delPhoto(2)">삭제</button>
        </div>
        <img id="img2" class="pslot-img"/>
        <div class="pslot-cap"><input type="text" id="cap2" placeholder="한 줄 설명 (선택)"/></div>
      </div>
      <div class="pslot" id="slot3">
        <div class="pslot-head">
          <div class="pslot-num">3</div>
          <div class="pslot-title">세 번째 사진</div>
          <label class="pslot-upload" for="file3">📷 선택</label>
          <input type="file" id="file3" accept="image/*" style="display:none" onchange="onPhoto(3,this)"/>
          <button class="pslot-del" onclick="delPhoto(3)">삭제</button>
        </div>
        <img id="img3" class="pslot-img"/>
        <div class="pslot-cap"><input type="text" id="cap3" placeholder="한 줄 설명 (선택)"/></div>
      </div>
    </div>
  </div>

</div>

<!-- ── 버튼 ── -->
<div class="btn-row" id="btn-row">
  <button class="btn btn-main" id="btn-main" onclick="handleBtn()">확인 →</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://hncuvjrghniwihhfpata.supabase.co',
  'sb_publishable_JcCV2PIrJV59VK9ihPCmXg_J0RmJ9AB'
);

let mode = 'verify'; // 'verify' | 'edit'
let currentP = null;
const photos = {};   // {1: base64, ...}  null = 삭제 예정
const photosDeleted = {};

window.onPhoto    = onPhoto;
window.delPhoto   = delPhoto;
window.handleBtn  = handleBtn;

// ── 버튼 핸들러 ──────────────────────────────────
async function handleBtn() {
  if (mode === 'verify') await doVerify();
  else await doSave();
}

// ── 본인 확인 ──────────────────────────────────
async function doVerify() {
  const phone = document.getElementById('v-phone').value.trim();
  if (!phone) { showMsg('verify-msg', '전화번호를 입력해 주세요.', 'err'); return; }

  const btn = document.getElementById('btn-main');
  btn.textContent = '확인 중…'; btn.disabled = true;

  // 번호 정규화 (하이픈 제거 후 비교)
  const norm = s => s.replace(/\D/g, '');
  const { data, error } = await sb
    .from('gohyang_participants')
    .select('*')
    .order('created_at');

  if (error) { showMsg('verify-msg', '오류가 발생했어요. 다시 시도해 주세요.', 'err'); btn.textContent = '확인 →'; btn.disabled = false; return; }

  const found = (data || []).find(p => norm(p.phone || '') === norm(phone));

  if (!found) {
    showMsg('verify-msg', '등록된 전화번호를 찾을 수 없어요.', 'err');
    btn.textContent = '확인 →'; btn.disabled = false;
    return;
  }

  currentP = found;
  loadEditForm(found);
  btn.textContent = '저장하기 💾'; btn.disabled = false;
}

// ── 수정 폼 채우기 ────────────────────────────
function loadEditForm(p) {
  document.getElementById('verify-section').style.display = 'none';
  document.getElementById('edit-section').style.display   = 'block';
  document.getElementById('u-name').textContent = p.name + '님';
  mode = 'edit';

  // 지역여정: 인코딩된 포맷에서 이름만 추출
  const names = (p.hometown_name || '').split(',').map(part => part.split('|')[0].trim()).join(', ');
  document.getElementById('e-hometown').value = names;
  document.getElementById('e-story').value    = p.story || '';

  [1, 2, 3].forEach(n => {
    const data = p['photo' + n + '_data'];
    const cap  = p['photo' + n + '_caption'] || '';
    if (data) {
      photos[n] = data;
      const img = document.getElementById('img' + n);
      img.src = data; img.style.display = 'block';
      document.getElementById('cap' + n).value = cap;
      document.getElementById('slot' + n).classList.add('filled');
    }
  });

  window.scrollTo(0, 0);
}

// ── 저장 ─────────────────────────────────────
async function doSave() {
  const hometown = document.getElementById('e-hometown').value.trim();
  if (!hometown) { alert('지역 여정을 입력해 주세요.'); return; }

  const btn = document.getElementById('btn-main');
  btn.textContent = '위치 확인 중…'; btn.disabled = true;

  const locResults   = await geocodeAll(hometown);
  const hometownEncoded = encodeLocations(locResults);
  const firstKorea   = locResults.find(r => r.lat && !r.is_foreign);
  const lat = firstKorea?.lat ?? null;
  const lng = firstKorea?.lng ?? null;

  btn.textContent = '저장 중…';

  const updates = {
    hometown_name:  hometownEncoded || null,
    lat, lng,
    story:          document.getElementById('e-story').value.trim() || null,
    photo1_data:    photos[1] ?? null,
    photo1_caption: document.getElementById('cap1').value.trim() || null,
    photo2_data:    photos[2] ?? null,
    photo2_caption: document.getElementById('cap2').value.trim() || null,
    photo3_data:    photos[3] ?? null,
    photo3_caption: document.getElementById('cap3').value.trim() || null,
  };

  const { error } = await sb
    .from('gohyang_participants')
    .update(updates)
    .eq('id', currentP.id);

  btn.disabled = false;

  if (error) {
    alert('저장 실패: ' + error.message);
    btn.textContent = '저장하기 💾';
  } else {
    btn.textContent = '✓ 저장됐어요!';
    btn.style.background = '#5d9e56';
    setTimeout(() => { btn.textContent = '저장하기 💾'; btn.style.background = ''; }, 2500);
  }
}

// ── 사진 처리 ──────────────────────────────────
async function onPhoto(n, input) {
  const file = input.files[0];
  if (!file) return;
  const data = await compress(file);
  photos[n] = data;
  delete photosDeleted[n];
  const img = document.getElementById('img' + n);
  img.src = data; img.style.display = 'block';
  document.getElementById('slot' + n).classList.add('filled');
}

function delPhoto(n) {
  photos[n] = null;
  photosDeleted[n] = true;
  const img = document.getElementById('img' + n);
  img.src = ''; img.style.display = 'none';
  document.getElementById('slot' + n).classList.remove('filled');
  document.getElementById('cap' + n).value = '';
  document.getElementById('file' + n).value = '';
}

function compress(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 900;
      const s = Math.min(MAX / img.width, MAX / img.height, 1);
      const c = document.createElement('canvas');
      c.width  = Math.round(img.width  * s);
      c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.72));
    };
    img.src = url;
  });
}

// ── 지오코딩 ──────────────────────────────────
const KR = { minLat: 33, maxLat: 38.7, minLng: 124.5, maxLng: 132.5 };

async function nmtFetch(q, koreaOnly) {
  try {
    const url = koreaOnly
      ? `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=kr`
      : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`;
    const d = await (await fetch(url, { headers: { 'Accept-Language': 'ko' } })).json();
    if (d.length > 0) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
  } catch(_) {}
  return null;
}

async function geocodeSingle(name) {
  let r = await nmtFetch(name, true);
  if (!r) { const pts = name.trim().split(/\s+/); if (pts.length > 1) r = await nmtFetch(pts[pts.length-1], true); }
  if (r) return { lat: r.lat, lng: r.lng, is_foreign: false };
  r = await nmtFetch(name, false);
  if (r) { const ok = r.lat>=KR.minLat&&r.lat<=KR.maxLat&&r.lng>=KR.minLng&&r.lng<=KR.maxLng; return { lat: r.lat, lng: r.lng, is_foreign: !ok }; }
  return { lat: null, lng: null, is_foreign: false };
}

async function geocodeAll(str) {
  const names = str.split(',').map(s => s.trim()).filter(Boolean);
  const results = [];
  for (let i = 0; i < names.length; i++) {
    results.push({ name: names[i], ...await geocodeSingle(names[i]) });
    if (i < names.length - 1) await new Promise(r => setTimeout(r, 1100));
  }
  return results;
}

function encodeLocations(results) {
  return results.map(r =>
    r.lat !== null
      ? `${r.name}|${r.lat.toFixed(5)}|${r.lng.toFixed(5)}${r.is_foreign ? '|foreign' : ''}`
      : r.name
  ).join(',');
}

// ── 상태 메시지 ────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="status-box ${type}">${text}</div>`;
}

// Enter키 지원
document.getElementById('v-phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleBtn();
});
</script>
</body>
</html>

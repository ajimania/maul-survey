<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 고향 자랑대회 | 참가자 관리</title>
  <style>
    :root {
      --bg: #1c1410; --surface: #2b1f18; --surface2: #3a2a20;
      --orange: #d4622a; --tan: #c9a97a;
      --text: #f0e4d4; --muted: rgba(240,228,212,.5);
      --border: rgba(255,255,255,.08);
      --green: #4ade80; --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
    }

    /* ── 잠금 화면 ── */
    #lock-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .lock-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 32px;
      text-align: center; width: 100%; max-width: 360px;
    }
    .lock-box h1 { font-size: 18px; font-weight: 900; color: var(--tan); margin-bottom: 6px; }
    .lock-box p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .lock-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 16px; font-family: inherit; margin-bottom: 12px;
      text-align: center; letter-spacing: .2em;
    }
    .lock-input:focus { outline: none; border-color: var(--orange); }
    .lock-btn {
      width: 100%; padding: 13px;
      background: var(--orange); border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .lock-err { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }

    /* ── 어드민 본체 ── */
    #admin-body { display: none; }

    .top-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 { font-size: 15px; font-weight: 900; color: var(--tan); }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }
    .count-badge {
      background: var(--orange); color: #fff;
      font-size: 12px; font-weight: 800;
      padding: 4px 12px; border-radius: 20px;
    }
    .refresh-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; padding: 6px 12px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .refresh-btn:hover { color: var(--text); }

    /* ── 필터/검색 ── */
    .filter-bar {
      padding: 12px 20px; display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 180px; padding: 9px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: inherit;
    }
    .search-input:focus { outline: none; border-color: var(--orange); }
    .search-input::placeholder { color: var(--muted); }
    .filter-btn {
      padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 700;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-family: inherit;
      transition: all .15s;
    }
    .filter-btn.on { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* ── 카드 그리드 ── */
    .card-grid {
      padding: 12px 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    @media (max-width: 500px) { .card-grid { grid-template-columns: 1fr; } }

    .p-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; cursor: pointer;
      transition: border-color .15s;
    }
    .p-card:hover { border-color: rgba(212,98,42,.4); }
    .p-card-head {
      padding: 16px 18px 12px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .p-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--orange); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff;
      overflow: hidden;
    }
    .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 16px; font-weight: 900; }
    .p-hometown { font-size: 12px; color: var(--tan); margin-top: 2px; }
    .p-date { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .p-badges { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 18px 12px; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; border: 1px solid;
    }
    .badge-paid   { color: var(--green); border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
    .badge-unpaid { color: var(--red);   border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
    .badge-photo  { color: var(--tan);   border-color: rgba(201,169,122,.3); background: rgba(201,169,122,.08); }

    .p-section {
      padding: 10px 18px; border-top: 1px solid var(--border);
      font-size: 12px; line-height: 1.7; color: var(--muted);
    }
    .p-section strong { color: var(--tan); font-size: 11px; display: block; margin-bottom: 2px; }
    .p-section .val { color: var(--text); }

    .p-contact {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .contact-chip {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .contact-chip a { color: var(--orange); text-decoration: none; }

    /* ── 사진 썸네일 ── */
    .p-photos {
      padding: 10px 18px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .p-thumb {
      width: 64px; height: 64px; border-radius: 8px;
      object-fit: cover; cursor: zoom-in;
      border: 1px solid var(--border);
    }

    /* ── 빈 상태 ── */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92); z-index: 9999;
      align-items: center; justify-content: center;
    }
    #lightbox.show { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    #lightbox-close {
      position: absolute; top: 20px; right: 24px;
      font-size: 28px; color: #fff; cursor: pointer; line-height: 1;
    }
  </style>
</head>
<body>

<!-- ── 잠금 화면 ── -->
<div id="lock-screen">
  <div class="lock-box">
    <h1>🔒 관리자 페이지</h1>
    <p>내 고향 자랑대회 · 참가자 관리</p>
    <input type="password" class="lock-input" id="pw-input"
           placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlock()"/>
    <button class="lock-btn" onclick="unlock()">입장</button>
    <div class="lock-err" id="pw-err">비밀번호가 맞지 않아요.</div>
  </div>
</div>

<!-- ── 어드민 본체 ── -->
<div id="admin-body">
  <div class="top-bar">
    <h1>🏡 참가자 관리</h1>
    <div class="top-bar-right">
      <span class="count-badge" id="cnt-badge">0명</span>
      <button class="refresh-btn" onclick="load()">↺ 새로고침</button>
    </div>
  </div>

  <div class="filter-bar">
    <input class="search-input" id="search" placeholder="이름·고향·전화번호 검색…" oninput="render()"/>
    <button class="filter-btn on" id="f-all"    onclick="setFilter('all')">전체</button>
    <button class="filter-btn"   id="f-paid"   onclick="setFilter('paid')">입금</button>
    <button class="filter-btn"   id="f-unpaid" onclick="setFilter('unpaid')">미입금</button>
    <button class="filter-btn"   id="f-photo"  onclick="setFilter('photo')">사진있음</button>
  </div>

  <div class="card-grid" id="card-grid">
    <div class="empty">불러오는 중…</div>
  </div>
</div>

<!-- ── 라이트박스 ── -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://hncuvjrghniwihhfpata.supabase.co',
  'sb_publishable_JcCV2PIrJV59VK9ihPCmXg_J0RmJ9AB'
);

const PASS_HASH = '11a85e50ae782ad85b78621c24e89c5366b3e81a2cb3996496d757ea4d6dfd15';

let all = [], filter = 'all';

window.unlock = async function() {
  const pw  = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hash === PASS_HASH) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('admin-body').style.display  = 'block';
    load();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
};

window.load = async function() {
  const { data, error } = await sb
    .from('gohyang_participants')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { alert('불러오기 실패: ' + error.message); return; }
  all = data || [];
  render();
};

window.setFilter = function(f) {
  filter = f;
  ['all','paid','unpaid','photo'].forEach(k => {
    document.getElementById('f-' + k).classList.toggle('on', k === f);
  });
  render();
};

window.render = function() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = all.filter(p => {
    if (filter === 'paid')   return p.payment_confirmed;
    if (filter === 'unpaid') return !p.payment_confirmed;
    if (filter === 'photo')  return p.photo1_data;
    return true;
  }).filter(p => {
    if (!q) return true;
    return [p.name, p.hometown_name, p.phone].some(v => v?.toLowerCase().includes(q));
  });

  document.getElementById('cnt-badge').textContent = all.length + '명';
  const grid = document.getElementById('card-grid');

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">참가자가 없어요.</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const photos = [p.photo1_data, p.photo2_data, p.photo3_data].filter(Boolean);
    const date   = p.created_at ? new Date(p.created_at).toLocaleDateString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const avatar = p.photo1_data
      ? `<img src="${p.photo1_data}" alt=""/>`
      : p.name.slice(0,1);

    return `<div class="p-card">
      <div class="p-card-head">
        <div class="p-avatar">${avatar}</div>
        <div class="p-info">
          <div class="p-name">${esc(p.name)}</div>
          <div class="p-hometown">📍 ${esc(p.hometown_name || '고향 미입력')}</div>
          <div class="p-date">${date}</div>
        </div>
      </div>
      <div class="p-badges">
        ${p.payment_confirmed
          ? '<span class="badge badge-paid">✓ 입금 완료</span>'
          : '<span class="badge badge-unpaid">미입금</span>'}
        ${photos.length ? `<span class="badge badge-photo">📸 사진 ${photos.length}장</span>` : ''}
      </div>
      ${p.story ? `<div class="p-section"><strong>고향 이야기</strong><span class="val">${esc(p.story)}</span></div>` : ''}
      ${p.apply_reason ? `<div class="p-section"><strong>신청 이유</strong><span class="val">${esc(p.apply_reason)}</span></div>` : ''}
      ${p.host_question ? `<div class="p-section"><strong>운영자 질문</strong><span class="val">${esc(p.host_question)}</span></div>` : ''}
      <div class="p-contact">
        <span class="contact-chip">📞 <a href="tel:${esc(p.phone)}">${esc(p.phone)}</a></span>
        ${p.email ? `<span class="contact-chip">✉️ <a href="mailto:${esc(p.email)}">${esc(p.email)}</a></span>` : ''}
      </div>
      ${photos.length ? `<div class="p-photos">${photos.map(src =>
        `<img class="p-thumb" src="${src}" onclick="openLightbox('${src}');event.stopPropagation()"/>`
      ).join('')}</div>` : ''}
    </div>`;
  }).join('');
};

window.openLightbox = function(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('show');
};

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>함양 샌드위치 상회 — 흑돼지 가지 라구 만들기</title>
<meta name="description" content="함양 곳곳에서 재료를 구해 흑돼지 가지 라구 샌드위치를 완성하는 미니게임. 마천면 흑돼지부터 지리산함양시장까지. by 남가좌439 프로젝트">
<meta property="og:title" content="함양 샌드위치 상회 — 흑돼지 가지 라구 만들기">
<meta property="og:description" content="함양에서 재료 구해다 라구 끓이고 샌드위치 쌓기. 당신의 함양 맛 카드는?">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --grey:#A9A59C;
  --grey-deep:#98948B;
  --paper:#F6F3EC;
  --card:#FFFEFA;
  --crayon:#211F1C;
  --white:#FDFCF8;
  --amber:#E8A13D;
  --amber-deep:#D4882A;
  --green:#5F7F4E;
  --green-soft:#8FA97E;
  --wine:#9A5A6B;
  --eggplant:#5B3B8C;
  --text:#33312C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Gowun Dodum',sans-serif;
  color:var(--text);
  background:var(--paper);
  background-image:radial-gradient(circle, rgba(33,31,28,.05) 1px, transparent 1.4px);
  background-size:16px 16px;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}
.jua{font-family:'Jua',sans-serif;font-weight:400;}
.hand{font-family:'Gaegu',cursive;}
.serif{font-family:'Noto Serif KR',serif;}
.wrap{max-width:560px;margin:0 auto;padding:22px 16px 60px;}

.wobble{border:3px solid var(--crayon);border-radius:255px 18px 225px 18px / 18px 225px 18px 255px;}
.wobble2{border:3px solid var(--crayon);border-radius:18px 225px 18px 255px / 255px 18px 225px 18px;}
.sticker{
  display:inline-block;background:var(--white);padding:7px 14px 5px;
  font-family:'Gaegu',cursive;font-weight:700;font-size:1.02rem;
  box-shadow:3px 3px 0 rgba(33,31,28,.85);
}
.circled{
  display:inline-block;border:2.5px solid currentColor;
  border-radius:50% 46% 52% 48% / 48% 52% 46% 54%;
  padding:2px 12px;transform:rotate(-4deg);
}
.btn{
  font-family:'Jua',sans-serif;font-size:1.05rem;padding:12px 22px 10px;
  background:var(--white);color:var(--crayon);border:3px solid var(--crayon);
  border-radius:255px 18px 225px 18px / 18px 225px 18px 255px;
  box-shadow:4px 4px 0 rgba(33,31,28,.85);cursor:pointer;
  transition:transform .15s;text-decoration:none;display:inline-block;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(33,31,28,.85);}
.btn.amber{background:var(--amber);}
.btn.green{background:var(--green);color:var(--white);}
.btn[disabled]{opacity:.35;pointer-events:none;}

.screen-head{text-align:center;margin-bottom:20px;}
.act-kicker{font-family:'Noto Serif KR',serif;font-size:.72rem;letter-spacing:.24em;color:var(--grey-deep);margin-bottom:8px;}
.act-title{font-family:'Jua',sans-serif;font-size:1.7rem;color:var(--crayon);transform:rotate(-1deg);margin-bottom:8px;}
.act-desc{font-family:'Gaegu',cursive;font-weight:700;font-size:1.08rem;color:var(--grey-deep);line-height:1.5;}

.panel{
  background:var(--card);padding:22px 18px 20px;margin:0 auto 18px;
  box-shadow:5px 5px 0 rgba(33,31,28,.8);
}
.hint-box{
  background:#FBEFD8;border:2.5px dashed var(--amber-deep);border-radius:14px;
  padding:12px 14px;font-size:.92rem;line-height:1.65;margin-bottom:16px;
}
.hint-box b{font-family:'Gaegu',cursive;font-weight:700;color:var(--amber-deep);}
.toast{
  font-family:'Gaegu',cursive;font-weight:700;font-size:1.15rem;text-align:center;
  min-height:1.6em;margin:10px 0 4px;color:var(--green);
}
.toast.bad{color:var(--wine);}

.spot-list{display:flex;flex-direction:column;gap:12px;}
.spot{
  display:flex;align-items:center;gap:14px;background:var(--card);
  border:3px solid var(--crayon);
  border-radius:255px 18px 225px 18px / 18px 225px 18px 255px;
  padding:12px 16px;cursor:pointer;box-shadow:4px 4px 0 rgba(33,31,28,.8);
  transition:transform .15s;text-align:left;width:100%;font-family:inherit;color:inherit;
}
.spot:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(33,31,28,.8);}
.spot.done{opacity:.55;pointer-events:none;background:#EFEBE0;}
.spot .s-icon{flex:none;width:52px;height:52px;}
.spot .s-icon svg{width:100%;height:100%;}
.spot .s-name{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--crayon);}
.spot .s-item{font-family:'Gaegu',cursive;font-weight:700;font-size:.95rem;color:var(--grey-deep);}
.spot .s-check{margin-left:auto;font-family:'Gaegu',cursive;font-weight:700;font-size:1.4rem;color:var(--green);}

.opt-list{display:flex;flex-direction:column;gap:10px;}
.q-opt{
  font-family:'Gowun Dodum',sans-serif;font-size:.98rem;text-align:left;
  background:var(--white);border:2.5px solid var(--crayon);border-radius:14px;
  padding:13px 15px;cursor:pointer;line-height:1.55;transition:transform .12s;
}
.q-opt b{font-family:'Gaegu',cursive;font-weight:700;font-size:1.08rem;display:block;}
.q-opt:active{transform:translateX(4px);}
.q-opt.picked-good{background:#E9F0DF;border-color:var(--green);}
.q-opt.picked-bad{background:#F4E3E7;border-color:var(--wine);}

.egg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.egg-cell{background:var(--white);border:2.5px solid var(--crayon);border-radius:14px;padding:6px;cursor:pointer;transition:transform .12s;}
.egg-cell svg{width:100%;height:74px;display:block;}
.egg-cell.sel-good{background:#E9F0DF;border-color:var(--green);}
.egg-cell.sel-bad{background:#F4E3E7;border-color:var(--wine);}
.egg-cell.lock{pointer-events:none;}

.tbar-outer{position:relative;height:46px;background:var(--white);border:3px solid var(--crayon);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.tbar-zone{position:absolute;top:0;bottom:0;background:#F3D9A4;}
.tbar-zone.core{background:var(--amber);}
.tbar-marker{position:absolute;top:2px;bottom:2px;width:10px;background:var(--crayon);border-radius:4px;}
.tbar-label{font-family:'Gaegu',cursive;font-weight:700;text-align:center;font-size:1rem;color:var(--grey-deep);margin-bottom:8px;}

.gauge-outer{height:26px;background:var(--white);border:2.5px solid var(--crayon);border-radius:20px;overflow:hidden;margin:6px 0 2px;}
.gauge-fill{height:100%;background:var(--green-soft);width:0%;transition:width .15s linear;}
.gauge-cap{font-family:'Gaegu',cursive;font-weight:700;font-size:.92rem;color:var(--grey-deep);}

.pot-scene{text-align:center;margin-bottom:10px;}
.pot-scene svg{width:190px;height:150px;}

.chip-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px;}
.chip{
  font-family:'Jua',sans-serif;font-size:1rem;padding:10px 16px 8px;
  background:var(--white);border:2.5px solid var(--crayon);
  border-radius:50% 46% 52% 48% / 48% 52% 46% 54%;cursor:pointer;transition:transform .12s;
}
.chip:active{transform:scale(.94);}
.chip.used{opacity:.25;pointer-events:none;}

.stack-area{min-height:190px;display:flex;flex-direction:column-reverse;align-items:center;justify-content:flex-start;gap:2px;padding:10px 0 4px;}
.layer{width:78%;max-width:300px;text-align:center;font-family:'Gaegu',cursive;font-weight:700;font-size:.95rem;padding:9px 0 7px;border:2.5px solid var(--crayon);animation:drop .25s ease-out;}
@keyframes drop{from{transform:translateY(-26px);opacity:0;}to{transform:none;opacity:1;}}

.local-card{
  background:var(--grey);color:var(--white);padding:20px 18px;margin-top:16px;
  box-shadow:5px 5px 0 rgba(33,31,28,.8);text-align:left;
}
.local-card .lc-tag{font-family:'Noto Serif KR',serif;font-size:.7rem;letter-spacing:.22em;display:block;margin-bottom:8px;color:#EDEAE2;}
.local-card .lc-place{font-family:'Jua',sans-serif;font-size:1.25rem;margin-bottom:8px;}
.local-card p{font-size:.93rem;line-height:1.75;}
.local-card .btn{margin-top:14px;}

.result-cover{
  background:var(--grey);color:var(--white);margin:0 auto 20px;
  padding:28px 22px 24px;position:relative;box-shadow:6px 6px 0 rgba(33,31,28,.8);text-align:center;
}
.result-kicker{font-family:'Noto Serif KR',serif;font-size:.72rem;letter-spacing:.22em;margin-bottom:12px;}
.result-art{display:flex;justify-content:center;margin-bottom:14px;}
.result-art svg{
  width:150px;height:150px;background:var(--white);border:3px solid var(--crayon);
  border-radius:50% 46% 52% 48% / 48% 52% 46% 54%;padding:14px;
  box-shadow:4px 4px 0 rgba(33,31,28,.4);transform:rotate(-3deg);
}
.result-name{font-family:'Jua',sans-serif;font-size:clamp(1.7rem,7.5vw,2.2rem);transform:rotate(-1.5deg);text-shadow:3px 3px 0 rgba(33,31,28,.3);margin-bottom:8px;}
.result-line{font-family:'Gaegu',cursive;font-weight:700;font-size:1.15rem;margin-bottom:16px;}
.stat-rows{background:rgba(253,252,248,.14);border:2.5px dashed rgba(253,252,248,.7);border-radius:16px;padding:14px 16px;text-align:left;}
.stat-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-family:'Gaegu',cursive;font-weight:700;font-size:.98rem;}
.stat-row .sr-name{flex:none;width:64px;}
.stat-row .sr-bar{flex:1;height:14px;background:rgba(253,252,248,.25);border-radius:8px;overflow:hidden;}
.stat-row .sr-fill{display:block;height:100%;background:var(--amber);border-radius:8px;}
.stat-row .sr-val{flex:none;width:34px;text-align:right;}

.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 18px;}
.coll-card{
  background:var(--card);border:2.5px solid var(--crayon);border-radius:12px;
  padding:12px 6px 10px;text-align:center;min-height:76px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.coll-card.empty{opacity:.4;border-style:dashed;}
.coll-card .cc-name{font-family:'Jua',sans-serif;font-size:.86rem;color:var(--crayon);line-height:1.3;}
.coll-card .cc-q{font-family:'Gaegu',cursive;font-weight:700;font-size:1.5rem;color:var(--grey-deep);}
.coll-card .cc-dot{width:12px;height:12px;border-radius:50%;}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}

.cover-hero{background:var(--grey);color:var(--white);padding:34px 22px 38px;text-align:center;box-shadow:6px 6px 0 rgba(33,31,28,.8);margin-bottom:22px;position:relative;overflow:hidden;}
.cover-hero .kicker{font-family:'Noto Serif KR',serif;font-size:.74rem;letter-spacing:.26em;margin-bottom:14px;}
.cover-hero h1{font-family:'Jua',sans-serif;font-size:clamp(2rem,9vw,2.7rem);line-height:1.25;transform:rotate(-1.5deg);text-shadow:3px 3px 0 rgba(33,31,28,.3);margin-bottom:14px;}
.cover-hero .sub{font-family:'Gaegu',cursive;font-weight:700;font-size:1.12rem;line-height:1.6;margin-bottom:6px;}
.cover-art{display:flex;justify-content:center;margin:18px 0 6px;}
.cover-art svg{width:170px;height:150px;background:var(--white);border:3px solid var(--crayon);border-radius:50% 46% 52% 48% / 48% 52% 46% 54%;padding:16px;box-shadow:4px 4px 0 rgba(33,31,28,.4);transform:rotate(-2deg);}
.footer-note{text-align:center;font-family:'Gaegu',cursive;font-weight:700;color:var(--grey-deep);font-size:.95rem;margin-top:28px;line-height:1.7;}
.center{text-align:center;}
.mt14{margin-top:14px;}
</style>
</head>
<body>
<div class="wrap"><div id="stage"></div>
<p class="footer-note">함양 샌드위치 상회 · 남가좌439 프로젝트<br>「함양, 이런 맛이었어?」 취향 테스트와 이어지는 두 번째 이야기</p>
</div>

<script>
'use strict';
/* ================= 상태 ================= */
const S = {fresh:0, cook:0, balance:0, secret:false, spotDone:{}, raf:null};
const $ = id => document.getElementById(id);
const stage = document.getElementById('stage');
function go(fn){ if(S.raf){cancelAnimationFrame(S.raf);S.raf=null;} window.scrollTo({top:0,behavior:'smooth'}); fn(); }

/* ================= 카드 도감 ================= */
const CARDS = [
 {id:'c1', name:'아직 설익은 맛', color:'#C9B79A', line:'괜찮아요. 라구는 원래 두 번째 끓일 때 더 맛있으니까.'},
 {id:'c2', name:'장날 단골 맛',   color:'#E8A13D', line:'지리산함양시장 2·7 장날, 단골 소리 듣는 맛이에요.'},
 {id:'c3', name:'읍내 소문난 맛', color:'#9A5A6B', line:'함양읍 골목골목까지 소문이 자자합니다.'},
 {id:'c4', name:'지리산 첫 줄기 맛', color:'#5F7F4E', line:'지리산 첫 줄기 바람이 그대로 담긴 완벽한 한 접시.'},
 {id:'c5', name:'오도재 산바람 맛', color:'#8FA97E', line:'산나물 한 줌이 비밀. 고개 넘는 바람 맛이 납니다.'},
 {id:'c6', name:'상림 천년의 맛', color:'#5B3B8C', line:'천년 숲 상림도 부러워할, 산나물 품은 비장의 라구.'},
];
function getColl(){ try{return JSON.parse(localStorage.getItem('hysw_cards')||'[]');}catch(e){return [];} }
function saveColl(id){ const c=getColl(); if(!c.includes(id)){c.push(id); localStorage.setItem('hysw_cards',JSON.stringify(c));} }

/* ================= 그림 조각 ================= */
const ART = {
 sandwich:`<svg viewBox="0 0 100 90"><g stroke="#211F1C" stroke-width="2.5" stroke-linejoin="round">
  <path d="M12 30 Q50 10 88 30 L86 40 Q50 26 14 40 Z" fill="#E8A13D"/>
  <path d="M14 42 Q50 34 86 42 L85 50 Q50 44 15 50 Z" fill="#8FA97E"/>
  <path d="M13 52 Q50 44 87 52 L86 60 Q50 54 14 60 Z" fill="#5B3B8C"/>
  <path d="M12 62 Q50 52 88 62 L87 71 Q50 63 13 71 Z" fill="#9A5A6B"/>
  <path d="M11 72 Q50 62 89 72 L87 82 Q50 74 13 82 Z" fill="#E8A13D"/></g></svg>`,
 pig:`<svg viewBox="0 0 100 100"><g stroke="#211F1C" stroke-width="2.5" fill="#3A3532" stroke-linejoin="round">
  <ellipse cx="50" cy="58" rx="32" ry="24"/>
  <circle cx="30" cy="40" r="14"/>
  <path d="M20 32 L16 22 L27 27 Z"/><path d="M38 30 L42 20 L31 25 Z"/></g>
  <ellipse cx="27" cy="43" rx="6" ry="4.5" fill="#D98E9C" stroke="#211F1C" stroke-width="2"/>
  <circle cx="26" cy="35" r="1.8" fill="#FDFCF8"/><circle cx="34" cy="36" r="1.8" fill="#FDFCF8"/>
  <path d="M78 55 Q86 50 82 44" fill="none" stroke="#211F1C" stroke-width="2.5" stroke-linecap="round"/></svg>`,
 egg:(good)=>`<svg viewBox="0 0 60 74"><path d="M30 16 Q${good?46:40} ${good?30:26} ${good?38:34} ${good?54:60} Q${good?32:30} ${good?68:70} ${good?22:24} ${good?60:64} Q${good?12:18} ${good?42:48} 30 16Z" fill="${good?'#5B3B8C':'#8E7A6B'}" stroke="#211F1C" stroke-width="2.5"/>
  <path d="M30 16 L30 6 M22 12 Q30 4 38 12" fill="none" stroke="${good?'#5F7F4E':'#7A6A55'}" stroke-width="3" stroke-linecap="round"/>
  ${good?'<path d="M24 30 Q22 40 26 50" stroke="#FDFCF8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".7"/>':''}</svg>`,
 market:`<svg viewBox="0 0 100 100"><g stroke="#211F1C" stroke-width="2.5" stroke-linejoin="round">
  <path d="M14 42 L86 42 L80 26 L20 26 Z" fill="#E8A13D"/>
  <rect x="20" y="42" width="60" height="36" fill="#FDFCF8"/>
  <rect x="42" y="54" width="16" height="24" fill="#9A5A6B"/></g>
  <path d="M14 42 Q20 50 26 42 Q32 50 38 42 Q44 50 50 42 Q56 50 62 42 Q68 50 74 42 Q80 50 86 42" fill="none" stroke="#211F1C" stroke-width="2"/></svg>`,
 bread:`<svg viewBox="0 0 100 100"><path d="M18 62 Q14 38 34 34 Q50 20 66 34 Q86 38 82 62 Q80 74 50 74 Q20 74 18 62Z" fill="#E8A13D" stroke="#211F1C" stroke-width="2.5"/>
  <path d="M34 44 L42 52 M48 40 L56 48 M62 44 L70 52" stroke="#211F1C" stroke-width="2" stroke-linecap="round"/></svg>`,
 herb:`<svg viewBox="0 0 100 100"><g stroke="#211F1C" stroke-width="2.5" fill="none" stroke-linecap="round">
  <path d="M50 82 L50 40"/><path d="M50 60 Q34 54 32 38 Q48 40 50 56"/><path d="M50 50 Q66 44 68 28 Q52 30 50 46"/></g>
  <path d="M50 40 Q42 26 50 14 Q58 26 50 40" fill="#5F7F4E" stroke="#211F1C" stroke-width="2.5"/></svg>`,
 pot:(fire)=>`<svg viewBox="0 0 120 100"><ellipse cx="60" cy="34" rx="34" ry="8" fill="#FDFCF8" stroke="#211F1C" stroke-width="2.5"/>
  <path d="M26 34 Q26 66 40 70 L80 70 Q94 66 94 34" fill="#9A5A6B" stroke="#211F1C" stroke-width="2.5"/>
  <path d="M40 24 Q42 14 40 8 M60 22 Q62 12 60 4 M80 24 Q82 14 80 8" fill="none" stroke="#A9A59C" stroke-width="2.5" stroke-linecap="round"/>
  <g transform="translate(0 ${20-fire*14})" opacity="${.4+fire*.6}">
  <path d="M48 92 Q44 ${86-fire*8} 52 ${82-fire*10} Q50 90 56 92 Z" fill="#E8A13D" stroke="#D4882A" stroke-width="1.5"/>
  <path d="M62 92 Q58 ${84-fire*10} 66 ${78-fire*12} Q64 88 72 92 Z" fill="#E8A13D" stroke="#D4882A" stroke-width="1.5"/></g>
  <line x1="30" y1="94" x2="90" y2="94" stroke="#211F1C" stroke-width="2.5" stroke-linecap="round"/></svg>`,
};

/* ================= 공통 UI ================= */
function localCard(place, tag, text, nextFn){
  stage.insertAdjacentHTML('beforeend',
   `<div class="local-card" id="lcard">
      <span class="lc-tag">${tag}</span>
      <div class="lc-place">${place}</div>
      <p>${text}</p>
      <div class="center"><button class="btn amber" id="lc-next">챙겨서 다음으로 →</button></div>
    </div>`);
  $('lc-next').onclick = ()=>go(nextFn);
  $('lcard').scrollIntoView({behavior:'smooth',block:'center'});
}
function head(kicker,title,desc){
  return `<div class="screen-head"><div class="act-kicker">${kicker}</div>
    <h2 class="act-title">${title}</h2><p class="act-desc">${desc}</p></div>`;
}

/* ================= 표지 ================= */
function renderCover(){
  const coll = getColl();
  stage.innerHTML = `
  <div class="cover-hero">
    <div class="kicker">HAMYANG SANDWICH CLUB</div>
    <h1>함양<br>샌드위치 상회</h1>
    <p class="sub">마천면 흑돼지, 상림 옆 가지밭, 지리산함양시장.<br>재료를 구해와 라구를 끓이고, 샌드위치를 쌓아요.</p>
    <div class="cover-art">${ART.sandwich}</div>
    <div style="margin-top:10px;"><span class="sticker" style="color:var(--crayon);">맛 카드 ${coll.length} / 6 수집</span></div>
  </div>
  <div class="center">
    <button class="btn amber" id="start" style="font-size:1.3rem;padding:16px 34px 13px;">장 보러 가기 →</button>
  </div>
  ${coll.length? `<div class="panel mt14"><p class="hand" style="font-weight:700;font-size:1.1rem;margin-bottom:10px;">지금까지 모은 맛 카드</p>${collGrid()}</div>`:''}`;
  $('start').onclick = ()=>go(renderMap);
}
function collGrid(){
  const coll = getColl();
  return `<div class="coll-grid">`+CARDS.map(c=>
    coll.includes(c.id)
    ? `<div class="coll-card"><div class="cc-dot" style="background:${c.color};"></div><div class="cc-name">${c.name}</div></div>`
    : `<div class="coll-card empty"><div class="cc-q">?</div></div>`).join('')+`</div>`;
}

/* ---- 공통 타이밍 바 ---- */
function timingBar(opts){
  /* opts: {zone:[a,b], core:[c,d], speed, label, btnText, rounds:[...], onRound(score,roundIdx), onDone()} */
  let pos = 0, dir = 1, round = 0, running = true;
  const zoneHTML = `<div class="tbar-zone" style="left:${opts.zone[0]}%;width:${opts.zone[1]-opts.zone[0]}%;"></div>
    <div class="tbar-zone core" style="left:${opts.core[0]}%;width:${opts.core[1]-opts.core[0]}%;"></div>
    <div class="tbar-marker" id="marker" style="left:0%;"></div>`;
  $('tbar').innerHTML = zoneHTML;
  function tick(){
    if(!running) return;
    pos += dir * opts.speed;
    if(pos>=100){pos=100;dir=-1;} if(pos<=0){pos=0;dir=1;}
    $('marker').style.left = `calc(${pos}% - 5px)`;
    S.raf = requestAnimationFrame(tick);
  }
  tick();
  $('tbtn').onclick = ()=>{
    if(!running) return;
    running = false; cancelAnimationFrame(S.raf); S.raf = null;
    const inCore = pos>=opts.core[0] && pos<=opts.core[1];
    const inZone = pos>=opts.zone[0] && pos<=opts.zone[1];
    opts.onHit(pos, inCore, inZone, ()=>{ running = true; tick(); });
  };
}

function renderSimmer(){
  stage.innerHTML = head('ACT 2 · 부엌','③ 뭉근하게 끓이기','라구의 심장! 12초 동안 불을 <b>약불 구간</b>에 붙잡아두세요.')+
  `<div class="panel">
    <div class="pot-scene" id="pot">${ART.pot(0.7)}</div>
    <p class="tbar-label">불 세기 — <b>주황 구간(약불)</b>을 지켜라</p>
    <div class="tbar-outer" id="heatbar" style="height:36px;">
      <div class="tbar-zone core" style="left:30%;width:28%;"></div>
      <div class="tbar-marker" id="needle" style="left:70%;"></div>
    </div>
    <div class="gauge-cap" style="margin-top:12px;">깊은맛 게이지</div>
    <div class="gauge-outer"><div class="gauge-fill" id="depth"></div></div>
    <div class="center mt14">
      <button class="btn" id="holdbtn" style="font-size:1.15rem;padding:16px 30px 13px;">🔥 꾹 누르면 불이 약해져요</button>
    </div>
    <p class="toast" id="toast"><span id="timer">12.0</span>초 남음</p>
  </div>`;
  let heat = 70, depth = 0, holding = false, last = null, remain = 12;
  const btn = $('holdbtn');
  const down = e=>{e.preventDefault();holding=true;};
  const up = ()=>{holding=false;};
  btn.addEventListener('pointerdown',down);
  window.addEventListener('pointerup',up);
  window.addEventListener('pointercancel',up);
  function tick(ts){
    if(last===null) last = ts;
    const dt = Math.min(.05,(ts-last)/1000); last = ts;
    heat += (holding? -34 : 17) * dt;
    heat = Math.max(0, Math.min(100, heat));
    const inZone = heat>=30 && heat<=58;
    if(inZone) depth += dt;
    remain -= dt;
    $('needle').style.left = `calc(${heat}% - 5px)`;
    $('depth').style.width = `${Math.min(100, depth/9*100)}%`;
    $('timer').textContent = Math.max(0,remain).toFixed(1);
    if(Math.random()<.03) $('pot').innerHTML = ART.pot(heat/100);
    if(remain<=0){
      window.removeEventListener('pointerup',up);
      window.removeEventListener('pointercancel',up);
      const pts = Math.round(Math.min(1, depth/9) * 34);
      S.cook += pts;
      $('toast').innerHTML = `보글보글… 라구 완성! 깊은맛 +${pts}`;
      setTimeout(()=>go(renderStack), 1200);
      return;
    }
    S.raf = requestAnimationFrame(tick);
  }
  S.raf = requestAnimationFrame(tick);
}

/* ================= 3막 · 샌드위치 조립 ================= */
function renderStack(){
  const layers = S.secret
   ? [{n:'치아바타 (아래)',c:'#E8A13D'},{n:'흑돼지 가지 라구',c:'#9A5A6B'},{n:'구운 가지',c:'#5B3B8C'},{n:'지리산 취나물',c:'#5F7F4E'},{n:'치아바타 (위)',c:'#E8A13D'}]
   : [{n:'치아바타 (아래)',c:'#E8A13D'},{n:'흑돼지 가지 라구',c:'#9A5A6B'},{n:'구운 가지',c:'#5B3B8C'},{n:'치아바타 (위)',c:'#E8A13D'}];
  const ideal = layers.map(l=>l.n);
  const shuffled = [...layers].sort(()=>Math.random()-.5);
  let placed = [];
  stage.innerHTML = head('ACT 3 · 조립대','샌드위치 쌓기','아래부터 순서대로! 무엇을 먼저 놓을까요?')+
  `<div class="panel">
    <div class="hint-box"><b>상회의 비법</b> — "빵이 바닥, 라구는 빵에 스며들게, 가지는 그 위에${S.secret?', 취나물은 향이 날아가지 않게 맨 위 빵 바로 아래':''}."</div>
    <div class="chip-row" id="chips"></div>
    <div class="stack-area wobble2" id="stackarea" style="background:var(--white);"></div>
    <p class="toast" id="toast"></p>
  </div>`;
  shuffled.forEach(l=>{
    const c = document.createElement('button');
    c.className='chip'; c.textContent = l.n;
    c.onclick = ()=>{
      c.classList.add('used');
      placed.push(l.n);
      const div = document.createElement('div');
      div.className='layer';
      div.style.background = l.c;
      div.style.color = '#FDFCF8';
      div.textContent = l.n;
      $('stackarea').appendChild(div);
      if(placed.length===ideal.length){
        let hit = 0;
        placed.forEach((n,i)=>{ if(n===ideal[i]) hit++; });
        S.balance = Math.round(hit/ideal.length*100);
        $('toast').textContent = hit===ideal.length? '완벽한 순서! 단면이 예술이다' : `쌓았다! (${hit}/${ideal.length} 층이 제자리)`;
        setTimeout(()=>go(renderResult), 1400);
      }
    };
    $('chips').appendChild(c);
  });
}

/* ================= 결과 ================= */
function pickCard(total){
  if(S.secret) return total>=65? CARDS[5] : CARDS[4];
  if(total>=85) return CARDS[3];
  if(total>=65) return CARDS[2];
  if(total>=45) return CARDS[1];
  return CARDS[0];
}
function crossSection(){
  const tilt = S.balance<60? 3 : 0;
  const herb = S.secret? `<g transform="rotate(${-tilt} 50 45)"><path d="M16 42 Q30 36 44 42 Q58 36 72 42 Q80 39 84 42 L83 48 Q50 42 17 48Z" fill="#5F7F4E" stroke="#211F1C" stroke-width="2"/></g>`:'';
  return `<svg viewBox="0 0 100 90">
   <g transform="rotate(${tilt} 50 20)"><path d="M12 22 Q50 4 88 22 L86 32 Q50 18 14 32Z" fill="#E8A13D" stroke="#211F1C" stroke-width="2.5"/></g>
   ${herb}
   <g transform="rotate(${-tilt} 50 54)"><path d="M13 52 Q50 44 87 52 L86 60 Q50 54 14 60Z" fill="#5B3B8C" stroke="#211F1C" stroke-width="2.5"/></g>
   <g transform="rotate(${tilt} 50 66)"><path d="M12 62 Q50 54 88 62 L87 72 Q50 64 13 72Z" fill="#9A5A6B" stroke="#211F1C" stroke-width="2.5"/>
   <circle cx="34" cy="65" r="2.5" fill="#3A3532"/><circle cx="56" cy="64" r="2.5" fill="#3A3532"/><circle cx="70" cy="66" r="2.5" fill="#3A3532"/></g>
   <g transform="rotate(${-tilt} 50 78)"><path d="M11 74 Q50 62 89 74 L87 84 Q50 74 13 84Z" fill="#E8A13D" stroke="#211F1C" stroke-width="2.5"/></g>
  </svg>`;
}
function renderResult(){
  const total = Math.round((Math.min(100,S.fresh)+Math.min(100,S.cook)+S.balance)/3);
  const card = pickCard(total);
  saveColl(card.id);
  const coll = getColl();
  stage.innerHTML = `
  <div class="result-cover">
    <div class="result-kicker">HAMYANG SANDWICH CLUB — TASTE CARD</div>
    <div class="result-art">${crossSection()}</div>
    <div class="result-name">${card.name}</div>
    <p class="result-line">"${card.line}"</p>
    <div class="stat-rows">
      ${[['신선도',Math.min(100,S.fresh)],['깊은맛',Math.min(100,S.cook)],['균형',S.balance]].map(([n,v])=>
        `<div class="stat-row"><span class="sr-name">${n}</span>
         <span class="sr-bar"><span class="sr-fill" style="width:${v}%;"></span></span>
         <span class="sr-val">${v}</span></div>`).join('')}
      <div class="stat-row" style="border-top:2px dashed rgba(253,252,248,.5);margin-top:6px;padding-top:10px;">
        <span class="sr-name">종합</span><span style="font-size:1.3rem;">${total}점 ${S.secret?'· 비밀 재료 🌿':''}</span>
      </div>
    </div>
  </div>
  <div class="panel">
    <p class="hand" style="font-weight:700;font-size:1.12rem;margin-bottom:4px;">맛 카드 도감 — ${coll.length} / 6</p>
    <p style="font-size:.88rem;color:var(--grey-deep);margin-bottom:4px;">점수와 비밀 재료에 따라 다른 카드가 나와요. 다 모아볼래요?</p>
    ${collGrid()}
    <div class="result-actions">
      <button class="btn" id="btn-share">카드 자랑하기</button>
      <button class="btn amber" id="btn-retry">다시 만들기 ↺</button>
    </div>
  </div>`;
  $('btn-retry').onclick = ()=>{
    S.fresh=0;S.cook=0;S.balance=0;S.secret=false;S.spotDone={};
    go(renderCover);
  };
  $('btn-share').onclick = async ()=>{
    const text = `함양 샌드위치 상회에서 「${card.name}」 카드를 얻었어요! (${total}점) 흑돼지 가지 라구 샌드위치, 직접 만들어보실래요?`;
    try{
      if(navigator.share){ await navigator.share({title:'함양 샌드위치 상회', text, url:location.href}); }
      else{
        await navigator.clipboard.writeText(text+' '+location.href);
        $('btn-share').textContent='복사 완료! 친구에게 붙여넣기';
        setTimeout(()=>$('btn-share').textContent='카드 자랑하기',2200);
      }
    }catch(e){}
  };
}

renderCover();
</script>
</body>
</html>
